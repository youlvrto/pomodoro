<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PomoFlow - 미니멀 포모도로 타이머</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Inter & Google Nanum Gothic fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', 'Nanum Gothic', sans-serif;
        }
        /* Smooth color transition for background and borders */
        .theme-transition {
            transition: background-color 0.8s ease, border-color 0.8s ease, color 0.8s ease, box-shadow 0.8s ease;
        }
    </style>
</head>
<body class="theme-transition min-h-screen flex flex-col justify-between bg-red-50 text-slate-800 transition-colors duration-700" id="body-bg">

    <!-- Toast Notification (Custom alert implementation) -->
    <div id="toast" class="fixed top-5 right-5 transform translate-y-[-100px] opacity-0 transition-all duration-500 ease-out z-50 flex items-center gap-3 bg-slate-900 text-white px-5 py-3.5 rounded-2xl shadow-2xl max-w-sm">
        <span id="toast-icon" class="text-xl">🍅</span>
        <p id="toast-message" class="text-sm font-semibold"></p>
    </div>

    <!-- Navigation / Header -->
    <header class="w-full max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <span class="text-2xl font-black tracking-tight flex items-center gap-1">
                <span class="text-red-500" id="logo-icon">🍅</span>
                <span class="theme-transition" id="logo-text">PomoFlow</span>
            </span>
        </div>
        <div class="flex items-center gap-3">
            <!-- White Noise Toggle -->
            <button id="noise-btn" onclick="toggleNoise()" class="flex items-center gap-2 bg-white/80 hover:bg-white border border-slate-200/50 px-4 py-2 rounded-full shadow-sm text-sm font-medium transition-all active:scale-95" title="집중 백색소음 (빗소리) 켜기/끄기">
                <i class="fa-solid fa-cloud-rain text-slate-500"></i>
                <span class="hidden md:inline text-slate-600">빗소리 소음</span>
                <span id="noise-status-badge" class="w-2 h-2 rounded-full bg-slate-300"></span>
            </button>
            <!-- Settings Toggle Button -->
            <button id="settings-btn" onclick="toggleSettingsModal()" class="flex items-center justify-center w-10 h-10 bg-white/80 hover:bg-white border border-slate-200/50 rounded-full shadow-sm transition-all active:scale-95" title="설정">
                <i class="fa-solid fa-sliders text-slate-600"></i>
            </button>
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="flex-grow w-full max-w-6xl mx-auto px-4 py-6 flex flex-col lg:flex-row gap-8 items-center lg:items-start justify-center">
        
        <!-- Left Column: Core Timer Card -->
        <div class="w-full lg:w-[50%] flex flex-col items-center">
            
            <!-- Mode Badges (Focus, Short Break, Long Break) -->
            <div class="flex bg-white/70 p-1.5 rounded-full shadow-md border border-slate-200/40 gap-1 mb-6">
                <button id="btn-mode-focus" onclick="setMode('focus')" class="px-5 py-2 rounded-full text-xs md:text-sm font-bold transition-all duration-300 bg-red-500 text-white shadow-sm">
                    🎯 집중
                </button>
                <button id="btn-mode-short" onclick="setMode('shortBreak')" class="px-5 py-2 rounded-full text-xs md:text-sm font-bold transition-all duration-300 text-slate-600 hover:bg-white/50">
                    ☕ 짧은 휴식
                </button>
                <button id="btn-mode-long" onclick="setMode('longBreak')" class="px-5 py-2 rounded-full text-xs md:text-sm font-bold transition-all duration-300 text-slate-600 hover:bg-white/50">
                    🌴 긴 휴식
                </button>
            </div>

            <!-- Timer Dashboard Main Card -->
            <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 border border-slate-200/60 relative overflow-hidden flex flex-col items-center">
                <!-- Glowing Accent Overlay based on status -->
                <div id="glow-overlay" class="absolute -top-24 -left-24 w-48 h-48 bg-red-100 rounded-full blur-3xl opacity-60 pointer-events-none transition-all duration-700"></div>
                <div id="glow-overlay-right" class="absolute -bottom-24 -right-24 w-48 h-48 bg-orange-100 rounded-full blur-3xl opacity-60 pointer-events-none transition-all duration-700"></div>

                <!-- Active Task Alert Display -->
                <div id="active-task-banner" class="w-full text-center py-2 px-4 mb-4 rounded-xl text-xs font-semibold bg-red-50 text-red-600 transition-colors duration-700 border border-red-100/50">
                    <i class="fa-solid fa-thumbtack mr-1 animate-bounce"></i> 진행 중인 작업: <span id="active-task-name">할 일을 먼저 추가해 보세요!</span>
                </div>

                <!-- SVG Circular Timer -->
                <div class="relative w-72 h-72 flex items-center justify-center my-4">
                    <svg class="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                        <!-- Background Circle -->
                        <circle cx="50" cy="50" r="44" stroke="#f1f5f9" stroke-width="4.5" fill="transparent" />
                        <!-- Progress Circle -->
                        <circle id="progress-circle" cx="50" cy="50" r="44" stroke="#ef4444" stroke-width="4.5" fill="transparent" 
                                stroke-dasharray="276.46" stroke-dashoffset="0" stroke-linecap="round" class="transition-all duration-300" />
                    </svg>
                    
                    <!-- Time digits inside the ring -->
                    <div class="absolute flex flex-col items-center justify-center">
                        <span id="timer-display" class="text-6xl font-black tracking-tighter text-slate-800">25:00</span>
                        <span id="status-text" class="text-xs font-bold tracking-widest uppercase text-red-500 mt-2">집중 모드</span>
                    </div>
                </div>

                <!-- Timer Controls -->
                <div class="flex items-center gap-4 mt-6 w-full justify-center">
                    <!-- Reset Button -->
                    <button onclick="resetTimer()" class="w-12 h-12 flex items-center justify-center rounded-full bg-slate-50 text-slate-500 hover:bg-slate-100 hover:text-slate-800 border border-slate-200 transition-all active:scale-95" title="초기화">
                        <i class="fa-solid fa-rotate-left text-lg"></i>
                    </button>
                    
                    <!-- Play/Pause Button -->
                    <button id="play-pause-btn" onclick="toggleTimer()" class="w-20 h-20 flex items-center justify-center rounded-full bg-red-500 hover:bg-red-600 text-white shadow-lg shadow-red-500/20 hover:shadow-red-500/30 transition-all duration-300 active:scale-95" title="시작 / 일시정지">
                        <i id="play-icon" class="fa-solid fa-play text-2xl ml-1"></i>
                    </button>

                    <!-- Skip Button -->
                    <button onclick="skipTimer()" class="w-12 h-12 flex items-center justify-center rounded-full bg-slate-50 text-slate-500 hover:bg-slate-100 hover:text-slate-800 border border-slate-200 transition-all active:scale-95" title="현재 세션 건너뛰기">
                        <i class="fa-solid fa-forward-step text-lg"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Right Column: To-Do List Card -->
        <div class="w-full lg:w-[50%] max-w-md bg-white rounded-3xl shadow-xl p-8 border border-slate-200/60 flex flex-col h-[520px]">
            <div class="flex justify-between items-center mb-5 pb-3 border-b border-slate-100">
                <h2 class="text-lg font-extrabold text-slate-800 flex items-center gap-2">
                    <i class="fa-solid fa-list-check text-slate-400"></i> 오늘의 할 일
                </h2>
                <span id="task-completion-stats" class="text-xs font-semibold bg-slate-100 px-3 py-1 rounded-full text-slate-500">완료 0/0</span>
            </div>

            <!-- Task Input Form -->
            <form onsubmit="addTask(event)" class="flex gap-2 mb-4">
                <input type="text" id="task-input" placeholder="이곳에 작업 내용을 적어주세요." required
                       class="flex-grow px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-red-400/50 focus:bg-white transition-all">
                <button type="submit" class="bg-slate-800 hover:bg-slate-900 text-white px-5 rounded-2xl text-sm font-bold flex items-center gap-1.5 transition-all active:scale-95">
                    <i class="fa-solid fa-plus"></i> 등록
                </button>
            </form>

            <!-- Tasks Scroll Container -->
            <div id="tasks-container" class="flex-grow overflow-y-auto space-y-2.5 pr-1 max-h-[350px]">
                <!-- Tasks will be dynamically injected here -->
            </div>
        </div>

    </main>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300">
        <div class="bg-white rounded-3xl p-6 w-11/12 max-w-sm shadow-2xl transform scale-95 transition-all duration-300" id="settings-card">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-black text-slate-800 flex items-center gap-2">
                    <i class="fa-solid fa-gear text-slate-400"></i> 시간 커스텀 설정
                </h3>
                <button onclick="toggleSettingsModal()" class="text-slate-400 hover:text-slate-600">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">집중 시간 (분)</label>
                    <input type="number" id="setting-focus" min="1" max="180" class="w-full px-4 py-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-red-400 focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">짧은 휴식 시간 (분)</label>
                    <input type="number" id="setting-short" min="1" max="60" class="w-full px-4 py-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-green-400 focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">긴 휴식 시간 (분)</label>
                    <input type="number" id="setting-long" min="1" max="120" class="w-full px-4 py-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-400 focus:outline-none">
                </div>
                <!-- Beep Test Option -->
                <div class="pt-2 border-t border-slate-100 flex items-center justify-between">
                    <span class="text-xs font-bold text-slate-500">알람 사운드 미리듣기</span>
                    <button onclick="playBeep(880, 0.1); setTimeout(() => playBeep(1200, 0.2), 150);" class="px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-semibold rounded-lg transition-all active:scale-95">
                        <i class="fa-solid fa-volume-high mr-1"></i> 테스트
                    </button>
                </div>
            </div>

            <button onclick="saveSettings()" class="w-full mt-6 bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-xl text-sm transition-all active:scale-95">
                저장 후 적용
            </button>
        </div>
    </div>

    <!-- Footer Information -->
    <footer class="w-full text-center py-4 text-xs font-medium text-slate-400">
        <p>© 2026 PomoFlow. 뽀모도로 시간기법을 활용해 생산성을 극대화하세요.</p>
    </footer>

    <script>
        // Core Pomodoro Configurations & State Variables
        let config = {
            focus: 25 * 60,       // 25 minutes default
            shortBreak: 5 * 60,   // 5 minutes default
            longBreak: 15 * 60    // 15 minutes default
        };

        let currentMode = 'focus'; // 'focus', 'shortBreak', 'longBreak'
        let timeRemaining = config.focus;
        let totalDuration = config.focus;
        let isRunning = false;
        let timerInterval = null;

        // Tasks state loaded from LocalStorage
        let tasks = JSON.parse(localStorage.getItem('pomoflow-tasks')) || [];
        let activeTaskId = localStorage.getItem('pomoflow-active-task-id') || null;

        // Synthetic Rain White Noise State
        let audioCtx = null;
        let noiseNode = null;
        let isNoisePlaying = false;

        // Custom Notification sound context
        function playBeep(frequency = 600, duration = 0.25) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(frequency, ctx.currentTime);
                
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.start();
                osc.stop(ctx.currentTime + duration);
            } catch (e) {
                console.warn('Audio Context is not allowed or supported yet.', e);
            }
        }

        // Pure Web Audio Synthesized Gentle Rain/Brown Noise Generator
        function startWhiteNoise() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                
                // Resume Context if suspended by browsers autoplay policies
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                const bufferSize = 2 * audioCtx.sampleRate;
                const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const output = noiseBuffer.getChannelData(0);

                let lastOut = 0.0;
                for (let i = 0; i < bufferSize; i++) {
                    const white = Math.random() * 2 - 1;
                    // Brownish noise formula for a rain/cascade effect
                    output[i] = (lastOut + (0.02 * white)) / 1.02;
                    lastOut = output[i];
                    output[i] *= 4.5; // Gain multiplier
                }

                noiseNode = audioCtx.createBufferSource();
                noiseNode.buffer = noiseBuffer;
                noiseNode.loop = true;

                // Add simple Low Pass Filter to make rain feel softer
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 1000; // soft rain cutoff

                const gainNode = audioCtx.createGain();
                gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime); // low level ambient volume

                noiseNode.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                noiseNode.start(0);
                isNoisePlaying = true;
                updateNoiseUI();
            } catch (err) {
                showToast("🔊 사운드 생성 중 에러가 발생했습니다.", "error");
                console.error(err);
            }
        }

        function stopWhiteNoise() {
            if (noiseNode) {
                try {
                    noiseNode.stop();
                    noiseNode.disconnect();
                } catch(e){}
                noiseNode = null;
            }
            isNoisePlaying = false;
            updateNoiseUI();
        }

        function toggleNoise() {
            if (isNoisePlaying) {
                stopWhiteNoise();
            } else {
                startWhiteNoise();
            }
        }

        function updateNoiseUI() {
            const btn = document.getElementById('noise-btn');
            const badge = document.getElementById('noise-status-badge');
            if (isNoisePlaying) {
                badge.className = "w-2 h-2 rounded-full bg-emerald-500 animate-pulse";
                btn.classList.add('border-emerald-200', 'bg-emerald-50/50');
            } else {
                badge.className = "w-2 h-2 rounded-full bg-slate-300";
                btn.classList.remove('border-emerald-200', 'bg-emerald-50/50');
            }
        }

        // Premium Toast Notification
        function showToast(message, type = "info") {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-message');
            const toastIcon = document.getElementById('toast-icon');

            toastMsg.innerText = message;
            
            if (type === "success") {
                toastIcon.innerText = "🎉";
                toast.className = "fixed top-5 right-5 transform translate-y-0 opacity-100 transition-all duration-500 ease-out z-50 flex items-center gap-3 bg-emerald-800 text-white px-5 py-3.5 rounded-2xl shadow-2xl max-w-sm";
            } else if (type === "complete") {
                toastIcon.innerText = "🍅";
                toast.className = "fixed top-5 right-5 transform translate-y-0 opacity-100 transition-all duration-500 ease-out z-50 flex items-center gap-3 bg-red-800 text-white px-5 py-3.5 rounded-2xl shadow-2xl max-w-sm";
            } else {
                toastIcon.innerText = "🔔";
                toast.className = "fixed top-5 right-5 transform translate-y-0 opacity-100 transition-all duration-500 ease-out z-50 flex items-center gap-3 bg-slate-900 text-white px-5 py-3.5 rounded-2xl shadow-2xl max-w-sm";
            }

            // Hide Toast after 3 seconds
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-[-100px]');
            }, 3000);
        }

        // Settings Modal Controls
        function toggleSettingsModal() {
            const modal = document.getElementById('settings-modal');
            const card = document.getElementById('settings-card');
            
            if (modal.classList.contains('opacity-0')) {
                // Populate current settings inputs
                document.getElementById('setting-focus').value = Math.floor(config.focus / 60);
                document.getElementById('setting-short').value = Math.floor(config.shortBreak / 60);
                document.getElementById('setting-long').value = Math.floor(config.longBreak / 60);

                modal.classList.remove('opacity-0', 'pointer-events-none');
                card.classList.remove('scale-95');
                card.classList.add('scale-100');
            } else {
                modal.classList.add('opacity-0', 'pointer-events-none');
                card.classList.remove('scale-100');
                card.classList.add('scale-95');
            }
        }

        function saveSettings() {
            const focusMin = parseInt(document.getElementById('setting-focus').value) || 25;
            const shortMin = parseInt(document.getElementById('setting-short').value) || 5;
            const longMin = parseInt(document.getElementById('setting-long').value) || 15;

            config.focus = focusMin * 60;
            config.shortBreak = shortMin * 60;
            config.longBreak = longMin * 60;

            localStorage.setItem('pomoflow-config', JSON.stringify(config));
            
            // Apply straight away if not running
            if (!isRunning) {
                resetTimer();
            }

            toggleSettingsModal();
            showToast("⏱️ 시간 설정이 완벽히 수정되었습니다.");
        }

        // Timer Modes Management
        function setMode(mode, forceReset = true) {
            currentMode = mode;
            timeRemaining = config[mode];
            totalDuration = config[mode];

            if (forceReset) {
                pauseTimer();
            }

            // Dynamically update visuals according to the specific mode
            const bodyBg = document.getElementById('body-bg');
            const logoIcon = document.getElementById('logo-icon');
            const logoText = document.getElementById('logo-text');
            const statusText = document.getElementById('status-text');
            const progressCircle = document.getElementById('progress-circle');
            const playPauseBtn = document.getElementById('play-pause-btn');
            const activeTaskBanner = document.getElementById('active-task-banner');

            // Reset active state class from header modes
            document.getElementById('btn-mode-focus').className = "px-5 py-2 rounded-full text-xs md:text-sm font-bold transition-all duration-300 text-slate-600 hover:bg-white/50";
            document.getElementById('btn-mode-short').className = "px-5 py-2 rounded-full text-xs md:text-sm font-bold transition-all duration-300 text-slate-600 hover:bg-white/50";
            document.getElementById('btn-mode-long').className = "px-5 py-2 rounded-full text-xs md:text-sm font-bold transition-all duration-300 text-slate-600 hover:bg-white/50";

            if (mode === 'focus') {
                bodyBg.className = "theme-transition min-h-screen flex flex-col justify-between bg-red-50 text-slate-800 transition-colors duration-700";
                logoIcon.innerText = "🍅";
                logoText.className = "text-slate-800 font-extrabold theme-transition";
                statusText.innerText = "집중 모드";
                statusText.className = "text-xs font-bold tracking-widest uppercase text-red-500 mt-2";
                progressCircle.setAttribute('stroke', '#ef4444');
                playPauseBtn.className = "w-20 h-20 flex items-center justify-center rounded-full bg-red-500 hover:bg-red-600 text-white shadow-lg shadow-red-500/20 hover:shadow-red-500/30 transition-all duration-300 active:scale-95";
                document.getElementById('btn-mode-focus').className = "px-5 py-2 rounded-full text-xs md:text-sm font-bold transition-all duration-300 bg-red-500 text-white shadow-sm";
                activeTaskBanner.className = "w-full text-center py-2 px-4 mb-4 rounded-xl text-xs font-semibold bg-red-50 text-red-600 transition-colors duration-700 border border-red-100/50";
                
                document.getElementById('glow-overlay').className = "absolute -top-24 -left-24 w-48 h-48 bg-red-100 rounded-full blur-3xl opacity-60 pointer-events-none transition-all duration-700";
                document.getElementById('glow-overlay-right').className = "absolute -bottom-24 -right-24 w-48 h-48 bg-orange-100 rounded-full blur-3xl opacity-60 pointer-events-none transition-all duration-700";
            } else if (mode === 'shortBreak') {
                bodyBg.className = "theme-transition min-h-screen flex flex-col justify-between bg-emerald-50 text-slate-800 transition-colors duration-700";
                logoIcon.innerText = "☕";
                logoText.className = "text-slate-800 font-extrabold theme-transition";
                statusText.innerText = "짧은 휴식";
                statusText.className = "text-xs font-bold tracking-widest uppercase text-emerald-500 mt-2";
                progressCircle.setAttribute('stroke', '#10b981');
                playPauseBtn.className = "w-20 h-20 flex items-center justify-center rounded-full bg-emerald-500 hover:bg-emerald-600 text-white shadow-lg shadow-emerald-500/20 hover:shadow-emerald-500/30 transition-all duration-300 active:scale-95";
                document.getElementById('btn-mode-short').className = "px-5 py-2 rounded-full text-xs md:text-sm font-bold transition-all duration-300 bg-emerald-500 text-white shadow-sm";
                activeTaskBanner.className = "w-full text-center py-2 px-4 mb-4 rounded-xl text-xs font-semibold bg-emerald-50 text-emerald-600 transition-colors duration-700 border border-emerald-100/50";

                document.getElementById('glow-overlay').className = "absolute -top-24 -left-24 w-48 h-48 bg-emerald-100 rounded-full blur-3xl opacity-60 pointer-events-none transition-all duration-700";
                document.getElementById('glow-overlay-right').className = "absolute -bottom-24 -right-24 w-48 h-48 bg-teal-100 rounded-full blur-3xl opacity-60 pointer-events-none transition-all duration-700";
            } else if (mode === 'longBreak') {
                bodyBg.className = "theme-transition min-h-screen flex flex-col justify-between bg-blue-50 text-slate-800 transition-colors duration-700";
                logoIcon.innerText = "🌴";
                logoText.className = "text-slate-800 font-extrabold theme-transition";
                statusText.innerText = "긴 휴식";
                statusText.className = "text-xs font-bold tracking-widest uppercase text-blue-500 mt-2";
                progressCircle.setAttribute('stroke', '#3b82f6');
                playPauseBtn.className = "w-20 h-20 flex items-center justify-center rounded-full bg-blue-500 hover:bg-blue-600 text-white shadow-lg shadow-blue-500/20 hover:shadow-blue-500/30 transition-all duration-300 active:scale-95";
                document.getElementById('btn-mode-long').className = "px-5 py-2 rounded-full text-xs md:text-sm font-bold transition-all duration-300 bg-blue-500 text-white shadow-sm";
                activeTaskBanner.className = "w-full text-center py-2 px-4 mb-4 rounded-xl text-xs font-semibold bg-blue-50 text-blue-600 transition-colors duration-700 border border-blue-100/50";

                document.getElementById('glow-overlay').className = "absolute -top-24 -left-24 w-48 h-48 bg-blue-100 rounded-full blur-3xl opacity-60 pointer-events-none transition-all duration-700";
                document.getElementById('glow-overlay-right').className = "absolute -bottom-24 -right-24 w-48 h-48 bg-indigo-100 rounded-full blur-3xl opacity-60 pointer-events-none transition-all duration-700";
            }

            updateTimerUI();
        }

        // Core Timer Actions
        function toggleTimer() {
            if (isRunning) {
                pauseTimer();
            } else {
                startTimer();
            }
        }

        function startTimer() {
            if (isRunning) return;
            
            // Request Audio permissions via simple user action activation
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            isRunning = true;
            document.getElementById('play-icon').className = "fa-solid fa-pause text-2xl";
            
            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimerUI();

                if (timeRemaining <= 0) {
                    handleSessionCompletion();
                }
            }, 1000);
        }

        function pauseTimer() {
            if (!isRunning) return;
            isRunning = false;
            document.getElementById('play-icon').className = "fa-solid fa-play text-2xl ml-1";
            clearInterval(timerInterval);
        }

        function resetTimer() {
            pauseTimer();
            timeRemaining = config[currentMode];
            updateTimerUI();
        }

        function skipTimer() {
            pauseTimer();
            if (currentMode === 'focus') {
                setMode('shortBreak');
                showToast("☕ 휴식 시간으로 넘어갑니다.");
            } else {
                setMode('focus');
                showToast("🍅 집중에 다시 돌입합니다!");
            }
        }

        // Session Finished Action Handler
        function handleSessionCompletion() {
            pauseTimer();
            
            if (currentMode === 'focus') {
                // Synthesize complex alert sound chime
                playBeep(880, 0.15);
                setTimeout(() => playBeep(1100, 0.15), 120);
                setTimeout(() => playBeep(1320, 0.3), 240);

                // Increment Active Task Tomato Count
                if (activeTaskId) {
                    const taskIndex = tasks.findIndex(t => t.id === activeTaskId);
                    if (taskIndex !== -1) {
                        tasks[taskIndex].tomatoes = (tasks[taskIndex].tomatoes || 0) + 1;
                        saveTasks();
                        renderTasks();
                        showToast(`🍅 집중 완료! '${tasks[taskIndex].text}' 태스크에 토마토 1개가 추가되었습니다.`, "complete");
                    }
                } else {
                    showToast("🍅 25분간의 환상적인 집중을 축하합니다!", "complete");
                }

                // Autoshift to Break
                setMode('shortBreak', false);
            } else {
                // Break End sounds
                playBeep(600, 0.2);
                setTimeout(() => playBeep(450, 0.3), 150);

                showToast("💪 휴식 끝! 이제 멋지게 다시 집중할 준비를 해볼까요?", "success");
                setMode('focus', false);
            }
        }

        // Timer Visual Update Renderer
        function updateTimerUI() {
            const minutes = Math.floor(timeRemaining / 60);
            const seconds = timeRemaining % 60;
            
            // Update Text Digits
            const formattedTime = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            document.getElementById('timer-display').innerText = formattedTime;
            
            // Update Browser Title
            const iconEmoji = currentMode === 'focus' ? '🍅' : (currentMode === 'shortBreak' ? '☕' : '🌴');
            document.title = `${formattedTime} ${iconEmoji} PomoFlow`;

            // Update SVG Ring Line
            const progressCircle = document.getElementById('progress-circle');
            const circumference = 2 * Math.PI * 44; // 276.46
            const progressPercent = timeRemaining / totalDuration;
            const strokeDashoffset = circumference * (1 - progressPercent);
            
            progressCircle.style.strokeDashoffset = strokeDashoffset;
        }

        // Tasks Manager
        function addTask(event) {
            event.preventDefault();
            const input = document.getElementById('task-input');
            const text = input.value.trim();
            if (!text) return;

            const newTask = {
                id: Date.now().toString(),
                text: text,
                completed: false,
                tomatoes: 0
            };

            tasks.push(newTask);
            
            // If there's no active task, set this newly created task as active
            if (!activeTaskId) {
                activeTaskId = newTask.id;
                localStorage.setItem('pomoflow-active-task-id', activeTaskId);
            }

            input.value = '';
            saveTasks();
            renderTasks();
            updateActiveTaskBanner();
            showToast("📝 새로운 할 일이 생성되었습니다.");
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            if (activeTaskId === id) {
                activeTaskId = tasks.length > 0 ? tasks[0].id : null;
                localStorage.setItem('pomoflow-active-task-id', activeTaskId || '');
            }
            saveTasks();
            renderTasks();
            updateActiveTaskBanner();
        }

        function toggleTaskComplete(id) {
            const taskIndex = tasks.findIndex(t => t.id === id);
            if (taskIndex !== -1) {
                tasks[taskIndex].completed = !tasks[taskIndex].completed;
                saveTasks();
                renderTasks();
                playBeep(1000, 0.1);
            }
        }

        function setActiveTask(id) {
            activeTaskId = id;
            localStorage.setItem('pomoflow-active-task-id', activeTaskId);
            updateActiveTaskBanner();
            renderTasks();
            showToast("🎯 현재 목표 집중 작업이 세팅되었습니다.");
        }

        function saveTasks() {
            localStorage.setItem('pomoflow-tasks', JSON.stringify(tasks));
        }

        function updateActiveTaskBanner() {
            const banner = document.getElementById('active-task-name');
            if (activeTaskId) {
                const activeTask = tasks.find(t => t.id === activeTaskId);
                if (activeTask) {
                    banner.innerText = activeTask.text;
                    return;
                }
            }
            banner.innerText = "할 일을 선택하고 뽀모도로 타이머를 돌려보세요!";
        }

        // Task List UI Redrawer
        function renderTasks() {
            const container = document.getElementById('tasks-container');
            container.innerHTML = '';

            let completedCount = 0;
            tasks.forEach(task => {
                if (task.completed) completedCount++;

                const taskEl = document.createElement('div');
                const isActive = task.id === activeTaskId;
                
                // Active task styling classes
                const borderClass = isActive ? 'border-red-300 bg-red-50/20' : 'border-slate-100 bg-slate-50/50 hover:bg-slate-50';
                
                // Tomatoes icon markup strings
                let tomatoesStr = '';
                for(let i=0; i<task.tomatoes; i++) {
                    tomatoesStr += '🍅';
                }

                taskEl.className = `flex items-center justify-between p-3.5 border rounded-2xl transition-all ${borderClass}`;
                taskEl.innerHTML = `
                    <div class="flex items-center gap-3 flex-grow min-w-0">
                        <!-- Complete Checkbox -->
                        <button onclick="toggleTaskComplete('${task.id}')" class="w-6 h-6 rounded-lg flex items-center justify-center border transition-all ${task.completed ? 'bg-slate-800 border-slate-800 text-white' : 'bg-white border-slate-300 hover:border-slate-500'}" title="완료 처리">
                            ${task.completed ? '<i class="fa-solid fa-check text-xs"></i>' : ''}
                        </button>
                        
                        <!-- Task Text content -->
                        <div class="flex flex-col min-w-0 cursor-pointer" onclick="setActiveTask('${task.id}')">
                            <span class="text-sm font-semibold truncate ${task.completed ? 'line-through text-slate-400' : 'text-slate-700'}">${task.text}</span>
                            <span class="text-xs text-slate-400 mt-0.5">${tomatoesStr || '등록된 집중 스탬프 없음'}</span>
                        </div>
                    </div>

                    <div class="flex items-center gap-2 ml-3">
                        <!-- Active Thumbtack Button -->
                        <button onclick="setActiveTask('${task.id}')" class="w-8 h-8 rounded-lg flex items-center justify-center transition-all ${isActive ? 'text-red-500 bg-red-100/50' : 'text-slate-400 hover:text-slate-600 hover:bg-slate-100'}" title="이 작업을 현재 세션에 고정">
                            <i class="fa-solid fa-thumbtack text-xs"></i>
                        </button>

                        <!-- Delete Button -->
                        <button onclick="deleteTask('${task.id}')" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-red-500 hover:bg-red-50 transition-all" title="삭제">
                            <i class="fa-solid fa-trash-can text-xs"></i>
                        </button>
                    </div>
                `;

                container.appendChild(taskEl);
            });

            // Update stats badge
            document.getElementById('task-completion-stats').innerText = `완료 ${completedCount}/${tasks.length}`;
        }

        // Initialize On Load
        window.onload = function() {
            // Load saved configuration if it exists
            const savedConfig = JSON.parse(localStorage.getItem('pomoflow-config'));
            if (savedConfig) {
                config = savedConfig;
            }

            // Populate Initial values and UI drawing
            setMode('focus', false);
            renderTasks();
            updateActiveTaskBanner();
        }
    </script>
</body>
</html>
